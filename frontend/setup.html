<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>System Update - Sung Jin Woo</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&display=swap');

        :root {
            --glow-blue: #00d4ff;
            --glow-purple: #8b5cf6;
            --bg-dark: rgba(10, 5, 25, 0.85);
            --border-blue: rgba(0, 212, 255, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            background: transparent;
            font-family: 'Rajdhani', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            overflow: hidden;
        }

        /* ── Main Container (Solo Leveling HUD Style) ────────────────────────── */
        #setup-window {
            width: 600px;
            background: var(--bg-dark);
            border: 1px solid var(--border-blue);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.2), inset 0 0 20px rgba(139, 92, 246, 0.1);
            backdrop-filter: blur(15px);
            position: relative;
            padding: 30px;
            clip-path: polygon(0 20px, 20px 0,
                    calc(100% - 20px) 0, 100% 20px,
                    100% calc(100% - 20px), calc(100% - 20px) 100%,
                    20px 100%, 0 calc(100% - 20px));
            animation: setup-appear 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes setup-appear {
            from {
                opacity: 0;
                transform: scale(0.9) translateY(20px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        /* Decorative Corners */
        .corner {
            position: absolute;
            width: 40px;
            height: 40px;
            border: 2px solid var(--glow-blue);
            pointer-events: none;
        }

        .top-left {
            top: 0;
            left: 0;
            border-right: none;
            border-bottom: none;
        }

        .top-right {
            top: 0;
            right: 0;
            border-left: none;
            border-bottom: none;
        }

        .bot-left {
            bottom: 0;
            left: 0;
            border-right: none;
            border-top: none;
        }

        .bot-right {
            bottom: 0;
            right: 0;
            border-left: none;
            border-top: none;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
        }

        h1 {
            font-size: 28px;
            letter-spacing: 4px;
            text-transform: uppercase;
            background: linear-gradient(90deg, var(--glow-blue), var(--glow-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 8px rgba(0, 212, 255, 0.5));
        }

        /* ── Content Sections ──────────────────────────────────────────────── */
        .view {
            display: none;
        }

        .view.active {
            display: block;
            animation: fade-in 0.4s ease;
        }

        @keyframes fade-in {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .stat-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 4px;
            border-left: 3px solid var(--glow-blue);
        }

        .stat-label {
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #a5b4fc;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 700;
            color: var(--glow-blue);
        }

        /* ── Inputs & UI Elements ─────────────────────────────────────────── */
        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
        }

        input {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(139, 92, 246, 0.4);
            padding: 12px;
            color: white;
            font-family: inherit;
            outline: none;
            transition: all 0.3s;
        }

        input:focus {
            border-color: var(--glow-blue);
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.2);
        }

        /* ── Progress Bars (HUD Style) ─────────────────────────────────────── */
        .hud-bar-container {
            margin: 20px 0;
            position: relative;
        }

        .hud-bar-label {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            margin-bottom: 5px;
        }

        .hud-bar {
            height: 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            overflow: hidden;
        }

        .hud-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #3b82f6, #06b6d4);
            box-shadow: 0 0 10px rgba(6, 182, 212, 0.5);
            transition: width 0.3s ease;
        }

        .hud-fill.purple {
            background: linear-gradient(90deg, #8b5cf6, #d946ef);
            box-shadow: 0 0 10px rgba(139, 92, 246, 0.5);
        }

        /* ── Buttons ───────────────────────────────────────────────────────── */
        .btn-container {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 12px;
            background: transparent;
            border: 1px solid var(--glow-blue);
            color: var(--glow-blue);
            font-family: inherit;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        button:hover {
            background: rgba(0, 212, 255, 0.1);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
        }

        button.primary {
            background: var(--glow-blue);
            color: black;
        }

        button.primary:hover {
            background: #00b8e6;
        }

        /* ── Log Box ───────────────────────────────────────────────────────── */
        #log-box {
            height: 120px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 10px;
            font-size: 12px;
            font-family: 'Courier New', Courier, monospace;
            color: #94a3b8;
            overflow-y: auto;
            margin-top: 20px;
        }

        .log-entry {
            margin-bottom: 4px;
        }

        .log-success {
            color: #4ade80;
        }

        .log-info {
            color: #38bdf8;
        }

        .log-warn {
            color: #fbbf24;
        }
    </style>
</head>

<body>

    <div id="setup-window">
        <div class="corner top-left"></div>
        <div class="corner top-right"></div>
        <div class="corner bot-left"></div>
        <div class="corner bot-right"></div>

        <header>
            <h1>System Wizard</h1>
        </header>

        <!-- Étape 1: Status & Check -->
        <div id="view-start" class="view active">
            <div class="stat-row">
                <span class="stat-label">Objectif actuel</span>
                <span class="stat-value">Éveil du Monarque</span>
            </div>
            <p style="text-align: center; margin-bottom: 20px; color: rgba(255,255,255,0.7);">
                Bienvenue, Chasseur. Souhaitez-vous initialiser l'Assistant Virtuel Sung Jin Woo ?
            </p>
            <div class="btn-container">
                <button onclick="showView('view-config')" class="primary">Démarrer la Quête</button>
                <button onclick="window.pywebview.api.close_wizard()">Plus tard</button>
            </div>
        </div>

        <!-- Étape 2: Configuration API -->
        <div id="view-config" class="view">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="input-group">
                    <label>Clé Picovoice</label>
                    <input type="text" id="api-picovoice" placeholder="ghX..." />
                </div>
                <div class="input-group">
                    <label>Clé Gemini</label>
                    <input type="password" id="api-gemini" placeholder="AIza..." />
                </div>
            </div>

            <div class="input-group">
                <label>Moteur LLM Préféré</label>
                <select id="llm-provider"
                    style="width:100%; background:rgba(0, 0, 0, 0.3); border:1px solid rgba(139, 92, 246, 0.4); padding:10px; color:white; font-family:inherit;">
                    <option value="ollama">Ollama (Local - Gratuit)</option>
                    <option value="gemini">Gemini (Cloud - Très intelligent)</option>
                </select>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="input-group">
                    <label>Couleur de l'Aura</label>
                    <input type="color" id="aura-color" value="#6600cc" style="height: 44px; padding: 2px;">
                </div>
                <div class="input-group">
                    <label>Taille du Monarque</label>
                    <div style="display: flex; align-items: center; height: 44px;">
                        <input type="range" id="scale" min="0.5" max="2.0" step="0.1" value="1.0">
                    </div>
                </div>
            </div>

            <div class="btn-container">
                <button onclick="showView('view-start')">Retour</button>
                <button onclick="startInstall()" class="primary">Valider & Installer</button>
            </div>
        </div>

        <!-- Étape 3: Installation en cours -->
        <div id="view-install" class="view">
            <div class="hud-bar-container">
                <div class="hud-bar-label">
                    <span>Installation des Modules</span>
                    <span id="progress-percent">0%</span>
                </div>
                <div class="hud-bar">
                    <div id="progress-fill" class="hud-fill"></div>
                </div>
            </div>

            <div class="hud-bar-container">
                <div class="hud-bar-label">
                    <span>Stabilité du Système</span>
                    <span>100%</span>
                </div>
                <div class="hud-bar">
                    <div class="hud-fill purple" style="width: 100%"></div>
                </div>
            </div>

            <div id="log-box">
                <div class="log-entry log-info">Initialisation du protocole d'installation...</div>
            </div>

            <div id="finish-actions" style="display:none;" class="btn-container">
                <button onclick="window.pywebview.api.launch_app()" class="primary">Éveiller l'Assistant</button>
            </div>
        </div>

    </div>

    <script>
        function showView(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        async function startInstall() {
            const config = {
                picovoice: document.getElementById('api-picovoice').value,
                gemini: document.getElementById('api-gemini').value,
                llm: document.getElementById('llm-provider').value,
                auraColor: document.getElementById('aura-color').value,
                scale: document.getElementById('scale').value
            };

            showView('view-install');

            // Appel à l'API Python pour installer
            window.pywebview.api.start_installation(config);
        }

        // Fonctions appelées par Python
        window.updateProgress = (percent, message, type = 'info') => {
            document.getElementById('progress-fill').style.width = percent + '%';
            document.getElementById('progress-percent').textContent = percent + '%';

            const logBox = document.getElementById('log-box');
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            entry.textContent = `> ${message}`;
            logBox.appendChild(entry);
            logBox.scrollTop = logBox.scrollHeight;

            if (percent >= 100) {
                document.getElementById('finish-actions').style.display = 'flex';
            }
        };
    </script>
</body>

</html>

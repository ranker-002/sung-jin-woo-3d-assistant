<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sung Jin Woo – Shadow Monarch</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: transparent !important;
      overflow: hidden;
      user-select: none;
      font-family: 'Rajdhani', sans-serif;
    }

    #canvas-container {
      position: fixed;
      inset: 0;
      background: transparent;
    }
    
    .pywebview-drag-region {
      -webkit-app-region: drag;
    }

    canvas {
      display: block;
      background: transparent !important;
    }

    /* ── UI Overlay ─────────────────────────────────────── */
    #ui-overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 100;
    }

    /* Barre de statut en haut */
    #status-bar {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(10, 5, 25, 0.7);
      border: 1px solid rgba(130, 60, 255, 0.4);
      border-radius: 20px;
      padding: 6px 16px;
      backdrop-filter: blur(12px);
      transition: opacity 0.3s;
    }

    #status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #7c3aed;
      box-shadow: 0 0 8px #7c3aed;
      transition: all 0.3s;
    }

    #status-dot.listening { background: #22c55e; box-shadow: 0 0 10px #22c55e; animation: pulse 1s infinite; }
    #status-dot.thinking  { background: #f59e0b; box-shadow: 0 0 10px #f59e0b; animation: pulse 0.6s infinite; }
    #status-dot.speaking  { background: #8b5cf6; box-shadow: 0 0 12px #8b5cf6; animation: pulse 0.4s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(1.3); }
    }

    #status-text {
      color: rgba(200, 180, 255, 0.9);
      font-size: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* Bulle de dialogue */
    #speech-bubble {
      position: absolute;
      bottom: 120px;
      left: 50%;
      transform: translateX(-50%);
      max-width: 320px;
      width: 90%;
      background: rgba(10, 5, 30, 0.85);
      border: 1px solid rgba(139, 92, 246, 0.5);
      border-radius: 16px;
      padding: 14px 18px;
      backdrop-filter: blur(16px);
      box-shadow: 0 0 30px rgba(109, 40, 217, 0.3), inset 0 1px 0 rgba(255,255,255,0.05);
      opacity: 0;
      transition: opacity 0.4s, transform 0.4s;
      transform: translateX(-50%) translateY(10px);
      pointer-events: none;
    }

    #speech-bubble.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    #speech-bubble::after {
      content: '';
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 16px; height: 8px;
      background: rgba(10, 5, 30, 0.85);
      clip-path: polygon(0 0, 100% 0, 50% 100%);
      border-bottom: 1px solid rgba(139, 92, 246, 0.5);
    }

    #speech-text {
      color: rgba(230, 210, 255, 0.95);
      font-size: 14px;
      line-height: 1.6;
      text-align: center;
    }

    #user-text {
      color: rgba(150, 130, 200, 0.7);
      font-size: 11px;
      text-align: center;
      margin-bottom: 8px;
      font-style: italic;
    }

    /* Zone de saisie texte */
    #input-area {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      width: 90%;
      max-width: 340px;
      pointer-events: all;
    }

    #text-input {
      flex: 1;
      background: rgba(10, 5, 30, 0.8);
      border: 1px solid rgba(109, 40, 217, 0.5);
      border-radius: 24px;
      padding: 10px 18px;
      color: rgba(220, 200, 255, 0.95);
      font-size: 13px;
      outline: none;
      backdrop-filter: blur(12px);
      transition: border-color 0.2s, box-shadow 0.2s;
      font-family: inherit;
    }

    #text-input::placeholder { color: rgba(130, 100, 200, 0.5); }
    #text-input:focus {
      border-color: rgba(139, 92, 246, 0.8);
      box-shadow: 0 0 16px rgba(109, 40, 217, 0.3);
    }

    #send-btn, #mic-btn {
      width: 42px; height: 42px;
      border-radius: 50%;
      border: 1px solid rgba(109, 40, 217, 0.5);
      background: rgba(10, 5, 30, 0.8);
      color: rgba(200, 170, 255, 0.9);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
      backdrop-filter: blur(12px);
      font-size: 16px;
    }

    #send-btn:hover, #mic-btn:hover {
      background: rgba(109, 40, 217, 0.3);
      box-shadow: 0 0 16px rgba(109, 40, 217, 0.4);
    }

    #mic-btn.active {
      background: rgba(34, 197, 94, 0.2);
      border-color: #22c55e;
      box-shadow: 0 0 16px rgba(34, 197, 94, 0.4);
      animation: pulse 1s infinite;
    }

    #wander-btn {
      width: 42px; height: 42px;
      border-radius: 50%;
      border: 1px solid rgba(109, 40, 217, 0.5);
      background: rgba(10, 5, 30, 0.8);
      color: rgba(200, 170, 255, 0.9);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
      backdrop-filter: blur(12px);
      font-size: 16px;
    }

    #wander-btn:hover {
      background: rgba(109, 40, 217, 0.3);
      box-shadow: 0 0 16px rgba(109, 40, 217, 0.4);
    }
    
    #wander-btn.active {
      background: rgba(139, 92, 246, 0.4);
      border-color: #8b5cf6;
      box-shadow: 0 0 16px rgba(139, 92, 246, 0.6);
    }

    /* XP Float Animation */
    .xp-float {
        position: absolute;
        top: 20%; right: 20px;
        color: #8b5cf6;
        font-weight: 800;
        font-size: 18px;
        pointer-events: none;
        z-index: 500;
        animation: xp-rise 1.5s ease-out forwards;
        font-family: 'Rajdhani', sans-serif;
    }
    @keyframes xp-rise {
        0% { transform: translateY(0); opacity: 0; }
        20% { opacity: 1; }
        100% { transform: translateY(-60px); opacity: 0; }
    }

    /* Poignée de déplacement */
    #drag-handle {
      position: absolute;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 80px; height: 16px;
      cursor: grab;
      pointer-events: all;
      display: flex; align-items: center; justify-content: center;
    }
    #drag-handle::after {
      content: '';
      width: 32px; height: 4px;
      border-radius: 2px;
      background: rgba(139, 92, 246, 0.3);
    }

    /* Loader initial */
    #loader {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, rgba(20, 5, 50, 0.95) 0%, rgba(5, 0, 20, 0.98) 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 1000;
      transition: opacity 0.8s;
    }

    #loader.hidden { opacity: 0; pointer-events: none; }

    .loader-portal {
      width: 120px; height: 120px;
      border-radius: 50%;
      border: 2px solid rgba(139, 92, 246, 0.6);
      box-shadow: 0 0 40px rgba(109, 40, 217, 0.6), inset 0 0 30px rgba(109, 40, 217, 0.3);
      animation: portal-spin 2s linear infinite;
      margin-bottom: 24px;
      position: relative;
    }

    .loader-portal::before {
      content: '';
      position: absolute;
      inset: 8px;
      border-radius: 50%;
      border: 1px solid rgba(200, 150, 255, 0.3);
      animation: portal-spin 1.5s linear infinite reverse;
    }

    .loader-portal::after {
      content: '⚔';
      position: absolute;
      inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 36px;
      color: rgba(200, 150, 255, 0.8);
      animation: none;
    }

    @keyframes portal-spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .loader-text {
      color: rgba(200, 160, 255, 0.8);
      font-size: 13px;
      letter-spacing: 3px;
      text-transform: uppercase;
      animation: flicker 2s ease-in-out infinite;
    }

    @keyframes flicker {
      0%, 100% { opacity: 0.8; }
      50%       { opacity: 0.4; }
    }

    /* Dungeon Stats */
    #dungeon-stats {
        position: absolute;
        top: 30px;
        right: 20px;
        text-align: right;
        font-family: 'Rajdhani', sans-serif;
        color: #8b5cf6;
        text-shadow: 0 0 10px rgba(139, 92, 246, 0.5);
        pointer-events: none;
        z-index: 100;
        transition: opacity 0.5s;
    }
    #lvl-val { font-size: 24px; font-weight: 700; display: block; letter-spacing: 1px; }
    #xp-bar { width: 80px; height: 3px; background: rgba(255,255,255,0.05); margin-top: 4px; border-radius: 2px; overflow: hidden; margin-left: auto; }
    #xp-fill { width: 0%; height: 100%; background: #8b5cf6; transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 0 8px #8b5cf6; }

    /* Drop Zone */
    #drop-overlay {
        position: fixed; inset: 0;
        background: rgba(139, 92, 246, 0.1);
        border: 2px dashed rgba(139, 92, 246, 0.5);
        display: none; align-items: center; justify-content: center;
        z-index: 2000; pointer-events: none;
        color: white; font-family: 'Rajdhani', sans-serif; font-size: 24px;
        backdrop-filter: blur(4px);
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="drop-overlay">ANALYSE D'OBJET...</div>
  
  <div id="dungeon-stats">
    <span id="lvl-val">LVL 1</span>
    <div id="xp-bar"><div id="xp-fill"></div></div>
  </div>

  <!-- Loader d'initialisation -->
  <div id="loader">
    <div class="loader-portal"></div>
    <div class="loader-text">Shadow Monarch s'éveille…</div>
  </div>
  
  <script>
    // Failsafe: Si le JS met trop de temps à charger (ex: 5s), on masque le loader de force
    setTimeout(() => {
      const l = document.getElementById('loader');
      if (l && !l.classList.contains('hidden')) {
        console.warn('[Failsafe] Masquage forcé du loader.');
        l.classList.add('hidden');
        setTimeout(() => l.style.display = 'none', 1000);
      }
    }, 5000);
  </script>

  <!-- Scène Three.js -->
  <div id="canvas-container"></div>

  <!-- UI Overlay -->
  <div id="ui-overlay">
    <div id="drag-handle" class="pywebview-drag-region"></div>

    <div id="status-bar" class="pywebview-drag-region" style="cursor: grab;">
      <div id="status-dot"></div>
      <span id="status-text">En veille</span>
    </div>

    <div id="speech-bubble">
      <div id="user-text"></div>
      <div id="speech-text"></div>
    </div>

    <div id="input-area">
      <input id="text-input" type="text" placeholder="Parler à Sung Jin Woo…" autocomplete="off" />
      <button id="send-btn" title="Envoyer">➤</button>
    </div>
  </div>

  <script>
    window.onerror = function(msg, url, line, col, error) {
      console.error(`[Global Error] ${msg} at ${url}:${line}:${col}`);
      return false;
    };
  </script>

  <!-- Polyfill for importmap -->
  <script async src="https://ga.jspm.io/npm:es-module-shims@1.10.0/dist/es-module-shims.js"></script>

  <script type="importmap-shim">
  {
    "imports": {
      "three":              "https://cdn.jsdelivr.net/npm/three@0.167.0/build/three.module.js",
      "three/addons/":      "https://cdn.jsdelivr.net/npm/three@0.167.0/examples/jsm/"
    }
  }
  </script>

  <script type="module-shim" src="main.js"></script>
</body>
</html>
